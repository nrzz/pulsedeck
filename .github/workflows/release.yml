name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci --prefer-online

      - name: Ensure app-builder binary
        shell: pwsh
        run: |
          $exe = "node_modules/app-builder-bin/win/x64/app-builder.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "Missing $exe — forcing reinstall of app-builder-bin"
            Remove-Item -Recurse -Force node_modules/app-builder-bin -ErrorAction SilentlyContinue
            npm install app-builder-bin@5.0.0-alpha.10 --force --no-save
          }
          if (-not (Test-Path $exe)) {
            throw "app-builder.exe still missing at $exe"
          }
          New-Item -ItemType Directory -Force -Path .cache | Out-Null
          Remove-Item -Recurse -Force .cache/app-builder-bin -ErrorAction SilentlyContinue
          Copy-Item -Recurse -Force node_modules/app-builder-bin .cache/app-builder-bin

      - name: Build Windows installer
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          # Root dist:win runs full monorepo build (shared/web/server) then packages
          npm run dist:win
          if (-not (Test-Path "apps/desktop/release/PulseDeck-Setup-*.exe")) {
            Get-ChildItem apps/desktop/release -ErrorAction SilentlyContinue
            throw "Windows installer missing"
          }
          Get-ChildItem apps/desktop/release/PulseDeck-Setup-*.exe | Format-Table Name, Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsedeck-windows
          path: apps/desktop/release/PulseDeck-Setup-*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci --prefer-online

      - name: Ensure app-builder binary
        run: |
          BIN="node_modules/app-builder-bin/linux/x64/app-builder"
          if [ ! -f "$BIN" ]; then
            rm -rf node_modules/app-builder-bin
            npm install app-builder-bin@5.0.0-alpha.10 --force --no-save
          fi
          test -f "$BIN"
          mkdir -p .cache
          rm -rf .cache/app-builder-bin
          cp -a node_modules/app-builder-bin .cache/app-builder-bin
          chmod +x "$BIN" || true

      - name: Build Linux packages
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          # Root dist:linux runs full monorepo build (shared/web/server) then packages
          npm run dist:linux
          ls -la apps/desktop/release/
          test -n "$(ls apps/desktop/release/PulseDeck-*.AppImage 2>/dev/null)"
          test -n "$(ls apps/desktop/release/PulseDeck-*-amd64.deb 2>/dev/null || ls apps/desktop/release/PulseDeck-*.deb 2>/dev/null)"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pulsedeck-linux
          path: |
            apps/desktop/release/PulseDeck-*.AppImage
            apps/desktop/release/PulseDeck-*.deb

  publish:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: pulsedeck-windows
          path: dist-release

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: pulsedeck-linux
          path: dist-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist-release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
