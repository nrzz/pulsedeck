name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci --prefer-online

      - name: Ensure app-builder binary
        shell: pwsh
        run: |
          $exe = "node_modules/app-builder-bin/win/x64/app-builder.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "Missing $exe — forcing reinstall of app-builder-bin"
            Remove-Item -Recurse -Force node_modules/app-builder-bin -ErrorAction SilentlyContinue
            npm install app-builder-bin@5.0.0-alpha.10 --force --no-save
          }
          if (-not (Test-Path $exe)) {
            throw "app-builder.exe still missing at $exe"
          }
          Get-Item $exe | Format-List FullName, Length

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsedeck-windows-installer
          path: apps/desktop/release/PulseDeck-Setup-*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop/release/PulseDeck-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
